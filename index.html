<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogiPartner Ver.1.2 Dev</title>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>LogiPartner</h1>
      <p>Ver.1.2 Dev｜連続スキャン対応</p>
    </section>

    <section class="camera-card">
      <div class="section-title">📷 連続スキャン</div>
      <div class="scan-message" id="scanMessage">カメラ起動を押してください。</div>

      <div id="scannerWrap" class="scanner-wrap">
        <div id="reader"></div>
      </div>

      <button class="scan-button" onclick="startScanner()">カメラ起動</button>
      <button class="stop-button" onclick="stopScanner()">スキャン停止</button>
      <button class="demo-button" onclick="demoScan()">テストスキャン</button>
    </section>

    <section class="summary-card">
      <h2>危険度サマリー</h2>
      <div class="summary">
        <div class="danger-box">
          <span>🔴 危険</span>
          <strong id="redCount">0件</strong>
          <small>30分以内</small>
        </div>
        <div class="warning-box">
          <span>🟡 注意</span>
          <strong id="yellowCount">0件</strong>
          <small>30分〜1時間</small>
        </div>
        <div class="safe-box">
          <span>🟢 安全</span>
          <strong id="greenCount">0件</strong>
          <small>1時間以上</small>
        </div>
      </div>
    </section>

    <section class="list-card">
      <div class="list-header">
        <h2>危険荷物一覧</h2>
        <span>赤から優先対応</span>
      </div>
      <div id="packageList" class="package-list"></div>
    </section>

    <section class="input-card">
      <details>
        <summary>手入力・確認者設定</summary>

        <label>確認者</label>
        <select id="checker">
          <option>大庭</option>
          <option>管理者A</option>
          <option>管理者B</option>
          <option>ワーカーA</option>
        </select>

        <label>荷物バーコード</label>
        <input id="barcode" value="LP-839204-TEST" />

        <label>CPTまでの残り時間（分）</label>
        <input id="cpt" type="number" value="42" />

        <label>滞留時間（分）</label>
        <input id="stay" type="number" value="78" />

        <button onclick="addOrUpdatePackage()">手動で記録する</button>
      </details>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

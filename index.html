<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worldview Match v2.0 Dev</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <section id="intro" class="intro">
    <div class="intro-logo">W</div>
    <div class="intro-name">Worldview Match</div>
    <div class="intro-copy">才能ではなく、<br>世界観でつながる。</div>
  </section>

  <section id="login" class="login hidden">
    <div class="login-card">
      <div class="logo large">W</div>
      <h1>Worldview Match</h1>
      <p class="muted">企業・表現者・オーナー・サブオーナーで権限を分けます。</p>

      <div class="role-select">
        <button class="role on" data-role="client">企業</button>
        <button class="role" data-role="creator">表現者</button>
        <button class="role" data-role="owner">オーナー</button>
        <button class="role" data-role="subowner">サブオーナー</button>
      </div>

      <input id="password" type="password" placeholder="パスワード" />
      <button id="loginBtn" class="primary full">ログイン</button>
      <p class="hint">企業 client123 / 表現者 creator123 / オーナー owner123 / サブ subowner123</p>
    </div>
  </section>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">W</div>
        <div>
          <h2>Worldview Match</h2>
          <p id="roleName">Role</p>
        </div>
      </div>
      <nav id="menu" class="menu"></nav>
      <button id="logoutBtn" class="ghost full">ログアウト</button>
    </aside>

    <main class="main">
      <section id="page-home" class="page"></section>
      <section id="page-projects" class="page hidden"></section>
      <section id="page-creators" class="page hidden"></section>
      <section id="page-match" class="page hidden"></section>
      <section id="page-proposals" class="page hidden"></section>
      <section id="page-chat" class="page hidden"></section>
      <section id="page-owner" class="page hidden"></section>
      <section id="page-subowners" class="page hidden"></section>
      <section id="page-audit" class="page hidden"></section>
      <section id="page-vault" class="page hidden"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>

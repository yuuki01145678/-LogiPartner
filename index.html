<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EIRAUM MAP Demo Ver.1.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">EIRAUM MAP</div>
      <div class="mode">MAP MODE / Ver.1.0</div>
    </header>

    <section class="hero">
      <p class="eyebrow">人を作品に昇華させる</p>
      <h1>EIRAUM</h1>
      <p class="lead">創造は、止まらない。</p>
    </section>

    <section class="map-wrap" aria-label="EIRAUM MAP">
      <div class="map">
        <button class="node core active" data-key="core">EIRAUM</button>

        <button class="node n1" data-key="world">世界と出会う</button>
        <button class="node n2" data-key="creation">創造</button>
        <button class="node n3" data-key="resonance">共鳴</button>
        <button class="node n4" data-key="memory">EIRAUM memory</button>
        <button class="node n5" data-key="owner">Owner</button>

        <span class="line l1"></span>
        <span class="line l2"></span>
        <span class="line l3"></span>
        <span class="line l4"></span>
        <span class="line l5"></span>
      </div>
    </section>

    <section class="panel" id="detailPanel">
      <p class="panel-label">現在の核</p>
      <h2 id="panelTitle">EIRAUM</h2>
      <p id="panelText">仕事をつなぐ会社ではない。人の中にある世界を見つけ、その世界を作品へと昇華させる会社。</p>
      <div class="tags" id="panelTags">
        <span>会社の脳</span><span>文化</span><span>世界観</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
